[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/generate-questions"
  to = "/.netlify/functions/generateQuestions"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
